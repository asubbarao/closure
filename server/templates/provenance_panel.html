<!-- Chain of custody card — mounted into case dashboard via PROVENANCE_MOUNT -->
<style>
.coc-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.coc-card .hd{padding:12px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
.coc-card .hd h3{font-size:13px;font-weight:600}
.coc-card .hd .sp{flex:1}
.coc-sum{display:flex;gap:14px;padding:10px 16px;font-size:11.5px;color:var(--ink2);border-bottom:1px solid var(--line2);flex-wrap:wrap;background:#F7F9FB}
.coc-sum b{font-family:var(--mono);color:var(--ink);font-weight:600}
.coc-sum .ok b{color:var(--ok)}
.coc-sum .break b{color:var(--rej)}
.coc-table{width:100%;border-collapse:collapse;font-size:12px}
.coc-table th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);font-weight:500;padding:8px 14px;border-bottom:1px solid var(--line2);background:#F7F9FB}
.coc-table td{padding:10px 14px;border-bottom:1px solid var(--line2);vertical-align:top}
.coc-table tr:last-child td{border-bottom:none}
.coc-table .mono{font-family:var(--mono);font-size:11px;word-break:break-all}
.coc-table .fn{font-weight:600;font-size:12.5px}
.coc-table .meta{color:var(--ink3);font-family:var(--mono);font-size:10.5px;margin-top:2px}
.coc-empty{padding:14px 16px;color:var(--ink3);font-size:12px}
.coc-err{padding:12px 16px;background:var(--rejbg);color:var(--rej);font-size:12px}
.coc-lineage{margin-top:4px;padding:6px 8px;background:#F7F9FB;border:1px solid var(--line2);border-radius:4px;font-family:var(--mono);font-size:10.5px;color:var(--ink2);line-height:1.45}
.coc-lineage .arr{color:var(--acc);font-weight:600}
</style>
<div class="coc-card" id="chain-of-custody" data-case-id="{{ case.id }}">
  <div class="hd">
    <h3>Chain of custody</h3>
    <span class="sp"></span>
    <span class="badge b-gray mono" id="coc-badge">loading…</span>
    <button type="button" class="btn small" id="coc-refresh" title="Re-check source fingerprints now">Re-check</button>
  </div>
  <div class="coc-sum" id="coc-sum">
    <span>Source docs <b id="coc-n">—</b></span>
    <span class="ok">Intact <b id="coc-ok">—</b></span>
    <span class="break">Breaks <b id="coc-break">—</b></span>
    <span>With export lineage <b id="coc-lineage-n">—</b></span>
  </div>
  <div id="coc-body"><div class="coc-empty">Loading provenance…</div></div>
</div>
<script>
(function () {
  var card = document.getElementById("chain-of-custody");
  if (!card) return;
  var caseId = card.getAttribute("data-case-id");
  var body = document.getElementById("coc-body");
  var badge = document.getElementById("coc-badge");

  function shortHash(h) {
    if (!h) return "—";
    return String(h).slice(0, 12) + "…" + String(h).slice(-8);
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function loadProvenance() {
    // Keep badge+body in loading state until the table is ready so consumers
    // (and e2e) never see a partial "checking…" badge without filenames.
    if (badge) {
      badge.textContent = "loading…";
      badge.className = "badge b-gray mono";
    }
    try {
      var res = await fetch("/api/cases/" + encodeURIComponent(caseId) + "/provenance", {
        headers: { Accept: "application/json" },
      });
      var text = await res.text();
      var rows;
      try {
        rows = JSON.parse(text);
      } catch (_) {
        throw new Error("non-JSON " + res.status);
      }
      if (!Array.isArray(rows)) rows = rows ? [rows] : [];

      var n = rows.length;
      var nOk = rows.filter(function (r) { return r.recheck_ok; }).length;
      var nBreak = n - nOk;
      var nLin = rows.filter(function (r) { return r.export_fingerprint; }).length;

      // Build body first, then flip summary + badge atomically after paint data is ready.
      var bodyHtml;
      if (n === 0) {
        bodyHtml = '<div class="coc-empty">No custody rows for this case.</div>';
      } else {
        var html =
          '<table class="coc-table"><thead><tr>' +
          "<th>Document</th><th>Source fingerprint</th><th>Revs</th><th>Re-check</th><th>Export lineage</th>" +
          "</tr></thead><tbody>";

        rows.forEach(function (r) {
          var ok = !!r.recheck_ok;
          var statusBadge = ok
            ? '<span class="badge b-ok">INTACT</span>'
            : '<span class="badge b-rej">BREAK</span>';
          var lineage = "—";
          if (r.export_fingerprint) {
            lineage =
              '<div class="coc-lineage">' +
              '<div>' + esc(shortHash(r.source_fingerprint)) +
              ' <span class="arr">→</span> ' +
              esc(shortHash(r.export_fingerprint)) +
              "</div>" +
              '<div class="meta">' +
              esc(r.export_path || "") +
              (r.exported_at ? " · " + esc(String(r.exported_at).slice(0, 19)) : "") +
              "</div></div>";
          }
          // Prefer live case filename; fall back to basename of source_path.
          var fname = r.filename || "";
          if (!fname && r.source_path) {
            fname = String(r.source_path).replace(/^.*\//, "").replace(/\.pdf$/i, "");
          }
          var fnameLabel = fname
            ? (/\.pdf$/i.test(fname) ? fname : fname + ".pdf")
            : "document " + (r.document_id != null ? r.document_id : "?");
          html +=
            "<tr data-document-id=\"" +
            esc(r.document_id) +
            "\">" +
            '<td><div class="fn">' +
            esc(fnameLabel) +
            '</div><div class="meta">' +
            esc(r.source_path) +
            "</div></td>" +
            '<td class="mono" title="' +
            esc(r.source_fingerprint) +
            '">' +
            esc(shortHash(r.source_fingerprint)) +
            "</td>" +
            '<td class="mono">' +
            esc(r.revision_count) +
            "</td>" +
            "<td>" +
            statusBadge +
            (ok
              ? ""
              : '<div class="meta">live ' +
                esc(shortHash(r.live_sha256)) +
                "</div>") +
            "</td>" +
            "<td>" +
            lineage +
            "</td>" +
            "</tr>";
        });
        html += "</tbody></table>";
        bodyHtml = html;
      }

      body.innerHTML = bodyHtml;

      var elN = document.getElementById("coc-n");
      var elOk = document.getElementById("coc-ok");
      var elBr = document.getElementById("coc-break");
      var elLn = document.getElementById("coc-lineage-n");
      if (elN) elN.textContent = String(n);
      if (elOk) elOk.textContent = String(nOk);
      if (elBr) elBr.textContent = String(nBreak);
      if (elLn) elLn.textContent = String(nLin);

      if (badge) {
        badge.textContent = nBreak === 0 ? "INTACT" : nBreak + " BREAK";
        badge.className = "badge mono " + (nBreak === 0 ? "b-ok" : "b-rej");
      }
    } catch (err) {
      if (badge) {
        badge.textContent = "error";
        badge.className = "badge b-rej mono";
      }
      body.innerHTML =
        '<div class="coc-err">Provenance load failed: ' +
        esc(err && err.message ? err.message : err) +
        "</div>";
    }
  }

  var btn = document.getElementById("coc-refresh");
  if (btn) btn.addEventListener("click", function () { loadProvenance(); });

  // Refresh after export so lineage rows appear without full page reload.
  var exportBtn = document.getElementById("export-btn");
  if (exportBtn) {
    exportBtn.addEventListener("click", function () {
      setTimeout(loadProvenance, 1500);
    });
  }

  loadProvenance();
})();
</script>
