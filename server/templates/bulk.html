<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closure — Bulk review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── CLOSURE design tokens (inlined) ── */
:root{
  --bg:#F4F5F6; --surface:#FFFFFF; --surface-2:#F9FAFB;
  --ink:#191B1E; --sub:#5A5F66; --mut:#878C93; --ink-inv:#FFFFFF;
  --line:#E4E6E9; --line-strong:#C9CCD1;
  --amber-fill:rgba(252,196,25,.32); --amber-fill-strong:rgba(252,196,25,.55);
  --amber-edge:#D99A06; --amber-text:#8A6A00; --amber-bg:#FFFBEE;
  --red:#C03221; --red-soft:rgba(192,50,33,.07); --red-mid:rgba(192,50,33,.16); --red-text:#A02A1C;
  --ok:#2F7D46; --ok-soft:rgba(47,125,70,.10);
  --cur:#1D63ED; --cur-soft:rgba(29,99,237,.08);
  --sans:"Inter",-apple-system,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --r-sm:5px; --r-md:8px; --r-lg:12px;
  --shadow-panel:0 1px 3px rgba(25,27,30,.08),0 4px 12px rgba(25,27,30,.06);
  --shadow-float:0 8px 28px rgba(25,27,30,.22),0 0 0 1px var(--line-strong);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);font-size:13.5px;line-height:1.5;
  color:var(--ink);min-height:100vh;
  background:rgba(25,27,30,.50);
  display:flex;align-items:center;justify-content:center;padding:32px;
  -webkit-font-smoothing:antialiased;font-feature-settings:"tnum";
}

/* ── Modal sheet ── */
.sheet{
  width:960px;
  max-height:90vh;
  background:var(--surface);
  border-radius:16px;
  box-shadow:0 32px 96px rgba(25,27,30,.45);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Sheet header ── */
.sh-head{padding:22px 28px 0;flex-shrink:0}
.sh-eyebrow{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.sh-title-row{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sh-title-row h1{font-size:23px;font-weight:700;letter-spacing:-.02em}
.sh-title-row .ek{font-size:11.5px;letter-spacing:.02em;color:var(--mut)}
.sh-title-row .close{margin-left:auto;color:var(--mut);font-size:22px;cursor:pointer;line-height:1;font-weight:300;border:none;background:transparent;padding:0 4px}
.sh-title-row .close:hover{color:var(--ink)}

/* Tally row */
.tally{display:flex;flex-wrap:wrap;gap:0;margin:10px 0 16px;font-size:13px}
.tally-item{padding:0 16px 0 0;margin-right:16px;border-right:1px solid var(--line);color:var(--sub)}
.tally-item:last-child{border-right:none;margin-right:0}
.tally-item b{font-family:var(--mono);color:var(--ink);font-weight:700}
.tally-item.warn b{color:var(--red)}
.tally-item.excl b{color:var(--amber-text)}

/* ── Confidence band tabs ── */
.bands-row{display:flex;gap:6px;padding:0 28px;margin-bottom:0;flex-shrink:0;border-bottom:1px solid var(--line)}
.band-tab{font:inherit;font-size:12.5px;font-weight:600;padding:10px 16px;border:none;background:transparent;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 80ms}
.band-tab .bcount{font-family:var(--mono);font-size:11px;font-weight:700;margin-left:6px;padding:2px 6px;border-radius:8px;background:var(--surface-2)}
.band-tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.band-tab.mid .bcount{background:var(--amber-bg);color:var(--amber-text)}
.band-tab.low .bcount{background:var(--red-mid);color:var(--red-text)}
.band-tab.active .bcount{background:var(--surface-2)}

/* ── Action bar ── */
.action-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 28px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  position:sticky;top:0;z-index:30;
}
.action-bar .sel-info{font-size:13px;color:var(--sub);margin-right:auto}
.action-bar .sel-info b{color:var(--ink);font-weight:600}
.action-bar .sel-info .propagates{
  display:inline-block;
  margin-left:8px;
  font-size:11px;
  color:var(--ok);
  font-weight:600;
  background:var(--ok-soft);
  padding:2px 8px;
  border-radius:8px;
}
.btn{font:inherit;font-weight:700;font-size:13px;padding:9px 18px;border-radius:var(--r-md);border:1px solid var(--line-strong);background:var(--surface);cursor:pointer;color:var(--ink);white-space:nowrap;transition:background 80ms}
.btn.accept-btn{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.accept-btn:hover:not([disabled]){background:#000}
.btn.reject-btn{color:var(--red);border-color:var(--red)}
.btn.reject-btn:hover:not([disabled]){background:var(--red-soft)}
.btn[disabled]{opacity:.4;cursor:not-allowed}

/* Flagged exclusion callout */
.flag-callout{
  display:flex;align-items:center;gap:10px;
  padding:9px 28px;
  background:var(--amber-bg);
  border-bottom:1px solid var(--amber-edge);
  font-size:12.5px;
  color:var(--amber-text);
  flex-shrink:0;
}
.flag-callout[hidden]{display:none}
.flag-callout .fc-icon{width:18px;height:18px;border-radius:50%;background:var(--amber-edge);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.flag-callout b{font-family:var(--mono);font-weight:600;color:var(--amber-text)}

/* ── Scrollable body ── */
.sheet-body{overflow-y:auto;flex:1;min-height:120px}
.sheet-body .empty,.sheet-body .loading,.sheet-body .error{
  padding:40px 28px;text-align:center;color:var(--sub);font-size:13.5px;
}
.sheet-body .error{color:var(--red-text)}

/* Document groups */
.doc-group{margin-bottom:0;border-bottom:1px solid var(--line)}
.doc-group:last-child{border-bottom:none}

.dg-head{
  display:flex;align-items:center;gap:10px;
  padding:11px 28px;
  background:var(--surface-2);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;
}
.dg-filename{font-weight:700;font-size:13.5px}
.dg-meta{font-family:var(--mono);font-size:11px;color:var(--mut)}
.dg-select-all{margin-left:auto;font-size:12px;font-weight:600;color:var(--cur);cursor:pointer;white-space:nowrap;border:none;background:transparent;font:inherit;font-size:12px;font-weight:600;color:var(--cur)}
.dg-select-all:hover{text-decoration:underline}

/* Instance rows */
.inst{
  display:flex;align-items:center;gap:12px;
  padding:10px 28px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background 60ms;
}
.inst:last-child{border-bottom:none}
.inst:hover{background:var(--bg)}
.inst.flagged-exc{background:var(--red-soft)}
.inst.flagged-exc:hover{background:var(--red-mid)}
.inst.decided{opacity:.55}
.inst input[type=checkbox]{accent-color:var(--ink);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.inst input[type=checkbox]:disabled{cursor:not-allowed}
.inst-ctx{flex:1;min-width:0;font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inst-ctx em{font-style:normal;background:var(--amber-fill);border-radius:2px;padding:0 2px;font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:500}
.inst-pg{font-family:var(--mono);font-size:10.5px;color:var(--mut);flex-shrink:0;min-width:28px;text-align:right}
.inst-conf{font-family:var(--mono);font-size:12px;font-weight:700;flex-shrink:0;width:26px;text-align:right}
.inst-conf.h{color:var(--ink)}.inst-conf.m{color:var(--amber-text)}.inst-conf.l{color:var(--red)}
.exc-why{
  font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--red-text);
  border:1px solid var(--red);
  border-radius:var(--r-sm);
  padding:2px 8px;
  flex-shrink:0;
  white-space:nowrap;
}
.exc-why.muted{color:var(--sub);border-color:var(--line-strong)}
.show-more{
  padding:9px 28px;
  font-size:12.5px;color:var(--cur);font-weight:600;
  cursor:pointer;
  text-align:center;
  border-bottom:1px solid var(--line);
  border-left:none;border-right:none;border-top:none;
  background:transparent;width:100%;font:inherit;font-size:12.5px;font-weight:600;color:var(--cur);
}
.show-more:hover{background:var(--cur-soft)}

/* ── Footer ── */
.sheet-foot{
  padding:13px 28px;
  border-top:1px solid var(--line);
  font-size:12px;color:var(--sub);
  background:var(--surface-2);
  flex-shrink:0;
  line-height:1.6;
}
.sheet-foot b{font-family:var(--mono);color:var(--ink);font-weight:600}

/* Result toast / status */
.bulk-status{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  max-width:720px;padding:10px 16px;border-radius:10px;
  background:var(--ink);color:#fff;font-size:12.5px;font-family:var(--mono);
  box-shadow:var(--shadow-float);z-index:100;display:none;
  white-space:pre-wrap;word-break:break-word;
}
.bulk-status.show{display:block}
.bulk-status.err{background:var(--red)}
</style>
</head>
<body>

<div class="sheet" id="sheet" role="dialog" aria-labelledby="entity-title">

  <div class="sh-head">
    <div class="sh-eyebrow">Bulk review — entity</div>
    <div class="sh-title-row">
      <h1 id="entity-title">Loading…</h1>
      <span class="ek" id="entity-kind">—</span>
      <button type="button" class="close" id="btn-close" aria-label="Close">✕</button>
    </div>
    <div class="tally" id="tally" aria-live="polite">
      <div class="tally-item"><b id="t-n">—</b> instances across <b id="t-d">—</b> documents</div>
      <div class="tally-item"><b id="t-s">0</b> selected to accept</div>
      <div class="tally-item excl"><b id="t-x">0</b> excluded — different context</div>
      <div class="tally-item"><b id="t-r">0</b> already decided</div>
    </div>
  </div>

  <div class="bands-row" id="bands-row" role="tablist">
    <button type="button" class="band-tab active" data-band="all">All <span class="bcount" id="bc-all">0</span></button>
    <button type="button" class="band-tab" data-band="high">HIGH ≥90 <span class="bcount" id="bc-high">0</span></button>
    <button type="button" class="band-tab mid" data-band="review">REVIEW 60–89 <span class="bcount" id="bc-review">0</span></button>
    <button type="button" class="band-tab low" data-band="flagged">FLAGGED &lt;60 <span class="bcount" id="bc-flagged">0</span></button>
    <button type="button" class="band-tab" data-band="decided" style="margin-left:auto">Already decided <span class="bcount" id="bc-decided">0</span></button>
  </div>

  <div class="flag-callout" id="flag-callout" hidden>
    <div class="fc-icon">!</div>
    <div id="flag-callout-text"></div>
  </div>

  <div class="action-bar">
    <div class="sel-info">
      <b id="sel-count">0 instances selected</b>
      <span class="propagates" id="sel-prop" hidden></span>
    </div>
    <button type="button" class="btn reject-btn" id="btn-reject" disabled>Reject selected</button>
    <button type="button" class="btn accept-btn" id="btn-accept" disabled>Accept 0 — lay the ink</button>
  </div>

  <div class="sheet-body" id="sheet-body">
    <div class="loading">Loading instances…</div>
  </div>

  <div class="sheet-foot">
    Every bulk action writes one audit event per instance — <b>who</b>, <b>what</b>, <b>when</b>, prior state.
  </div>

</div>

<div class="bulk-status" id="bulk-status" role="status"></div>

<script src="/static/bulk.js"></script>
</body>
</html>
