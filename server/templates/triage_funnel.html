<!-- TRIAGE FUNNEL — case-wide auto-pass + residual group queue chrome -->
<div class="funnel" id="triage-funnel" role="region" aria-label="Triage funnel">
  <div class="funnel-title">
    <span>Triage funnel</span>
    <span class="funnel-scope" id="funnel-scope-label">case-wide</span>
  </div>
  <div class="funnel-steps" id="funnel-steps">
    <div class="fstep" data-step="total">
      <span class="fv" id="funnel-total">—</span>
      <span class="fl">total</span>
    </div>
    <span class="farrow" aria-hidden="true">→</span>
    <div class="fstep auto" data-step="auto">
      <span class="fv" id="funnel-auto">—</span>
      <span class="fl">auto-pass ≥<b id="funnel-thr-label">90</b></span>
    </div>
    <span class="farrow" aria-hidden="true">→</span>
    <div class="fstep residual" data-step="residual">
      <span class="fv" id="funnel-residual">—</span>
      <span class="fl">need eyes</span>
    </div>
  </div>
  <div class="funnel-progress" id="funnel-progress-line">
    <span id="funnel-progress-text">— of — resolved · — residual left</span>
  </div>
  <div class="funnel-threshold" id="funnel-threshold">
    <span class="ftl">Threshold</span>
    <div class="thr-presets" role="group" aria-label="Confidence threshold">
      <button type="button" class="thr" data-thr="80">80</button>
      <button type="button" class="thr" data-thr="85">85</button>
      <button type="button" class="thr on" data-thr="90">90</button>
      <button type="button" class="thr" data-thr="95">95</button>
    </div>
    <input type="range" id="thr-slider" min="60" max="99" value="90" step="1"
           aria-label="High-confidence threshold" />
    <span class="thr-val" id="thr-val">90</span>
  </div>
  <button type="button" class="btn funnel-accept" id="btn-accept-high" disabled>
    Accept all <b id="btn-accept-high-n">0</b> high-confidence
  </button>
  <div class="funnel-note" id="funnel-note">
    Flagged + known FPs never auto-pass. Residual groups batch-judge below.
  </div>
  <div class="funnel-tools">
    <button type="button" class="btn small on" id="btn-scope-case" data-scope="case">Whole case</button>
    <button type="button" class="btn small" id="btn-scope-doc" data-scope="doc">This doc</button>
    <button type="button" class="btn small" id="btn-pending-only" aria-pressed="true">Pending only</button>
  </div>
</div>
