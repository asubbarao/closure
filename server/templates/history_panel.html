<!-- HISTORY_PANEL: Google-Docs-style version timeline (mounted by app.sql) -->
<style>
/* History rail — right drawer */
.hist-fab{
  position:fixed;right:16px;bottom:72px;z-index:90;
  font-family:var(--sans,'IBM Plex Sans',system-ui,sans-serif);
  font-weight:600;font-size:12px;padding:8px 12px;border-radius:6px;
  border:1px solid var(--line,#D6DCE3);background:var(--panel,#fff);
  color:var(--ink,#1A2230);cursor:pointer;
  box-shadow:0 2px 10px rgba(26,34,48,.12);
  display:inline-flex;align-items:center;gap:6px;
}
.hist-fab:hover{border-color:var(--acc,#1D4ED8);color:var(--acc,#1D4ED8)}
.hist-fab .dot{width:7px;height:7px;border-radius:50%;background:var(--acc,#1D4ED8)}
.hist-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(360px,92vw);z-index:110;
  background:var(--panel,#fff);border-left:1px solid var(--line,#D6DCE3);
  box-shadow:-8px 0 32px rgba(26,34,48,.12);
  display:flex;flex-direction:column;transform:translateX(105%);
  transition:transform .18s ease;
}
.hist-drawer.open{transform:translateX(0)}
.hist-scrim{
  position:fixed;inset:0;z-index:105;background:rgba(26,34,48,.28);
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.hist-scrim.open{opacity:1;pointer-events:auto}
.hist-hd{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--line,#D6DCE3);flex-shrink:0;
}
.hist-hd h2{font-size:14px;font-weight:700;flex:1;margin:0}
.hist-hd .sub{font-size:11px;color:var(--ink3,#8A94A6);font-weight:500}
.hist-close{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--line,#D6DCE3);
  background:var(--panel,#fff);cursor:pointer;font-size:16px;line-height:1;
  color:var(--ink2,#5A6577);
}
.hist-close:hover{background:var(--ws,#E9ECF0)}
.hist-tools{
  display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line2,#E4E8EE);
  flex-shrink:0;
}
.hist-tools .btn{
  font-family:var(--sans,'IBM Plex Sans',system-ui,sans-serif);
  font-weight:600;font-size:11.5px;padding:6px 10px;border-radius:6px;
  border:1px solid var(--line,#D6DCE3);background:var(--panel,#fff);
  color:var(--ink,#1A2230);cursor:pointer;
}
.hist-tools .btn.primary{background:var(--ink,#1A2230);border-color:var(--ink,#1A2230);color:#fff}
.hist-tools .btn[disabled]{opacity:.42;cursor:not-allowed}
.hist-tools .hint{font-size:11px;color:var(--ink3,#8A94A6);margin-left:auto;align-self:center}
.hist-list{flex:1;overflow-y:auto;padding:8px 0 24px}
.hist-empty{padding:28px 18px;color:var(--ink3,#8A94A6);font-size:12.5px;line-height:1.5;text-align:center}
.hist-item{
  position:relative;padding:12px 16px 12px 36px;border-bottom:1px solid var(--line2,#E4E8EE);
  cursor:default;
}
.hist-item::before{
  content:"";position:absolute;left:18px;top:18px;width:8px;height:8px;border-radius:50%;
  background:var(--acc,#1D4ED8);box-shadow:0 0 0 3px var(--accbg,#EBF0FE);
}
.hist-item::after{
  content:"";position:absolute;left:21px;top:28px;bottom:-1px;width:2px;background:var(--line2,#E4E8EE);
}
.hist-item:last-child::after{display:none}
.hist-item.undone{opacity:.55}
.hist-item.undone::before{background:var(--ink3,#8A94A6);box-shadow:none}
.hist-item.is-undo::before{background:var(--pend,#B45309);box-shadow:0 0 0 3px var(--pendbg,#FDF3E3)}
.hist-item .lbl{
  font-size:12.5px;font-weight:600;color:var(--ink,#1A2230);line-height:1.35;
}
.hist-item.undone .lbl{text-decoration:line-through;color:var(--ink2,#5A6577)}
.hist-item .meta{
  display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:4px;
  font-family:var(--mono,'IBM Plex Mono',ui-monospace,monospace);
  font-size:10.5px;color:var(--ink3,#8A94A6);
}
.hist-item .counts{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.hist-item .chip{
  font-family:var(--mono,'IBM Plex Mono',ui-monospace,monospace);
  font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;
  background:var(--ws,#E9ECF0);color:var(--ink2,#5A6577);
}
.hist-item .chip.ok{background:var(--okbg,#E7F5EE);color:var(--ok,#087443)}
.hist-item .chip.rej{background:var(--rejbg,#FDECEA);color:var(--rej,#B42318)}
.hist-item .chip.pend{background:var(--pendbg,#FDF3E3);color:var(--pend,#B45309)}
.hist-item .chip.undo{background:var(--accbg,#EBF0FE);color:var(--acc,#1D4ED8)}
.hist-item .actions{margin-top:8px;display:flex;gap:6px}
.hist-item .actions button{
  font-family:var(--sans,'IBM Plex Sans',system-ui,sans-serif);
  font-size:11px;font-weight:600;padding:4px 8px;border-radius:5px;
  border:1px solid var(--line,#D6DCE3);background:var(--panel,#fff);
  color:var(--ink,#1A2230);cursor:pointer;
}
.hist-item .actions button:hover{border-color:var(--acc,#1D4ED8);color:var(--acc,#1D4ED8)}
.hist-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:130;
  background:var(--ink,#1A2230);color:#fff;padding:10px 16px;border-radius:6px;
  font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(26,34,48,.28);
  max-width:min(520px,92vw);display:none;align-items:center;gap:12px;
}
.hist-toast.show{display:flex}
.hist-toast .t-undo{
  font-weight:700;background:transparent;border:1px solid rgba(255,255,255,.35);
  color:#fff;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;
}
body.hist-open{overflow:hidden}
</style>

<button type="button" class="hist-fab" id="hist-fab" title="Version history (H)" aria-controls="hist-drawer">
  <span class="dot" aria-hidden="true"></span> History
</button>
<div class="hist-scrim" id="hist-scrim" hidden></div>
<aside class="hist-drawer" id="hist-drawer" role="dialog" aria-label="Version history" aria-hidden="true">
  <div class="hist-hd">
    <div>
      <h2>Version history</h2>
      <div class="sub">Google-Docs-style timeline · append-only</div>
    </div>
    <button type="button" class="hist-close" id="hist-close" aria-label="Close history">×</button>
  </div>
  <div class="hist-tools">
    <button type="button" class="btn primary" id="hist-undo-btn" title="Undo latest batch (U / ⌘Z)">Undo latest</button>
    <button type="button" class="btn" id="hist-refresh">Refresh</button>
    <span class="hint"><kbd style="font-family:var(--mono,'IBM Plex Mono',monospace);font-size:10px;border:1px solid var(--line,#D6DCE3);border-radius:3px;padding:1px 4px">u</kbd> / ⌘Z</span>
  </div>
  <div class="hist-list" id="hist-list">
    <div class="hist-empty">Loading history…</div>
  </div>
</aside>
<div class="hist-toast" id="hist-toast" role="status" aria-live="polite"></div>
