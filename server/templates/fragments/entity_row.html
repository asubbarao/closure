{# e: { id, canonical_text, kind_label, mono } #}
<div class="entity-row" id="e-{{ e.id }}">
  <div style="flex:1">
    <div class="{% if e.mono %}mono{% endif %}" style="font-weight:600">{{ e.canonical_text }}</div>
    <div class="mono" style="font-size:11px;color:var(--ink2)">{{ e.kind_label }}</div>
  </div>
  <button type="button" class="btn" data-action="entity" data-entity-id="{{ e.id }}" data-status="accepted">Accept all</button>
  <button type="button" class="btn danger" data-action="entity" data-entity-id="{{ e.id }}" data-status="rejected">Reject all</button>
</div>
