<div class="sugg" data-id="{{ s.id }}" data-status="{{ s.status }}">
  <div style="flex:1">
    <div style="font-weight:600">{{ s.text }}</div>
    <div class="mono" style="font-size:11px;opacity:.75">p.{{ s.page_no }} · {{ s.band }} · {{ s.confidence }} · {{ s.status }}</div>
  </div>
  {% if s.status == 'pending' %}
  <button type="button" class="btn" data-action="decide" data-id="{{ s.id }}" data-status="accepted">A</button>
  <button type="button" class="btn danger" data-action="decide" data-id="{{ s.id }}" data-status="rejected">R</button>
  {% endif %}
</div>
