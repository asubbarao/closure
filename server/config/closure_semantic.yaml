# Closure semantic model — dimensions for slicing, not a metrics laundry.
#
# Prefer Friendly SQL for ad-hoc rollups:
#   FROM v_suggestions s JOIN documents d ON d.id = s.document_id
#   WHERE d.case_id = ?
#   SELECT status, band, count(), avg(confidence)
#   GROUP BY ALL
#
# SUMMARIZE for raw profiles:
#   FROM (SUMMARIZE v_suggestions);
#   GET /api/catalog/:relation/summary
#
# Optional semantic_view (if you need a named model):
#   FROM semantic_view('closure', dimensions := ['status', 'band'], metrics := ['n']);
# "How many pending?" → filter status, don't invent pending_count.

comment: Review graph — suggestions ⋈ documents ⋈ cases ⋈ entities

tables:
  - alias: s
    table: v_suggestions
    pk_columns: [id]
  - alias: d
    table: documents
    pk_columns: [id]
  - alias: c
    table: cases
    pk_columns: [id]
  - alias: e
    table: entities
    pk_columns: [id]

joins:
  - name: sug_doc
    table: d
    from_alias: s
    fk_columns: [document_id]
    cardinality: ManyToOne
  - name: doc_case
    table: c
    from_alias: d
    fk_columns: [case_id]
    cardinality: ManyToOne
  - name: sug_entity
    table: e
    from_alias: s
    fk_columns: [entity_id]
    cardinality: ManyToOne

dimensions:
  - name: suggestion_id
    expr: s.id
    source_table: s
  - name: document_id
    expr: s.document_id
    source_table: s
  - name: page_no
    expr: s.page_no
    source_table: s
  - name: status
    expr: s.status
    source_table: s
  - name: band
    expr: s.band
    source_table: s
  - name: kind
    expr: s.kind
    source_table: s
  - name: source
    expr: s.source
    source_table: s
  - name: detector_key
    expr: s.detector_key
    source_table: s
  - name: judge_panel
    expr: s.judge_panel
    source_table: s
  - name: flag_tag
    expr: s.flag_tag
    source_table: s
  - name: filename
    expr: d.filename
    source_table: d
  - name: case_id
    expr: c.id
    source_table: c
  - name: case_no
    expr: c.case_no
    source_table: c
  - name: entity_id
    expr: e.id
    source_table: e
  - name: entity_kind
    expr: e.kind
    source_table: e
  - name: entity_text
    expr: e.canonical_text
    source_table: e
  - name: group_key
    expr: s.group_key
    source_table: s

# Minimal real measures if you call semantic_view — prefer GROUP BY ALL in app SQL.
metrics:
  - name: n
    expr: COUNT(*)
    source_table: s
  - name: avg_confidence
    expr: AVG(s.confidence)
    source_table: s
