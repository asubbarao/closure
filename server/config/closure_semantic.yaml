# Closure semantic model — first-class schema graph for the review domain.
# Loaded at boot: CREATE SEMANTIC VIEW closure FROM YAML FILE '…'
#
# Role in the app:
#   tables + joins  = the FOIA review graph (what relates to what)
#   dimensions      = typed slice axes (status, band, kind, case, entity, …)
#   metrics         = real measures only (never invent pending_count / hit_count)
#
# Product handlers always SELECT grain tables/views (v_suggestions, entities, …).
# Console / ops / ad-hoc analytics use this graph:
#
#   FROM semantic_view('closure',
#     dimensions := ['case_id', 'status', 'band'],
#     metrics := ['avg_confidence']);
#
# Raw profile (no invented metrics):
#   FROM (SUMMARIZE v_suggestions);
#   GET /api/catalog/v_suggestions/summary

comment: >
  FOIA review graph — suggestions (mark grain) ⋈ documents ⋈ cases ⋈ entities.
  Geometry lives on the mark grain (bbox / screen STRUCTs), not as dimensions.

tables:
  - alias: sug
    table: v_suggestions
    pk_columns: [id]
  - alias: doc
    table: documents
    pk_columns: [id]
  - alias: cas
    table: cases
    pk_columns: [id]
  - alias: ent
    table: entities
    pk_columns: [id]
  - alias: jdg
    table: suggestion_judges
    pk_columns: [suggestion_id]

joins:
  - name: suggestion_to_document
    table: doc
    from_alias: sug
    fk_columns: [document_id]
    cardinality: ManyToOne
  - name: document_to_case
    table: cas
    from_alias: doc
    fk_columns: [case_id]
    cardinality: ManyToOne
  - name: suggestion_to_entity
    table: ent
    from_alias: sug
    fk_columns: [entity_id]
    cardinality: ManyToOne
  - name: suggestion_to_judge
    table: jdg
    from_alias: sug
    fk_columns: [id]
    # suggestion_judges.suggestion_id ← sug.id
    cardinality: OneToOne

dimensions:
  # Mark grain
  - name: suggestion_id
    expr: sug.id
    source_table: sug
  - name: document_id
    expr: sug.document_id
    source_table: sug
  - name: page_no
    expr: sug.page_no
    source_table: sug
  - name: status
    expr: sug.status
    source_table: sug
  - name: band
    expr: sug.band
    source_table: sug
  - name: kind
    expr: sug.kind
    source_table: sug
  - name: source
    expr: sug.source
    source_table: sug
  - name: detector_key
    expr: sug.detector_key
    source_table: sug
  - name: judge_panel
    expr: sug.judge_panel
    source_table: sug
  - name: flag_tag
    expr: sug.flag_tag
    source_table: sug
  - name: confidence
    expr: sug.confidence
    source_table: sug
  - name: group_key
    expr: sug.group_key
    source_table: sug
  # Document / case
  - name: filename
    expr: doc.filename
    source_table: doc
  - name: case_id
    expr: cas.id
    source_table: cas
  - name: case_no
    expr: cas.case_no
    source_table: cas
  # Entity
  - name: entity_id
    expr: ent.id
    source_table: ent
  - name: entity_kind
    expr: ent.kind
    source_table: ent
  - name: entity_text
    expr: ent.canonical_text
    source_table: ent
  # Judge panel (when joined)
  - name: vote_pattern
    expr: jdg.vote_pattern
    source_table: jdg
  - name: vote_context
    expr: jdg.vote_context
    source_table: jdg
  - name: vote_prior
    expr: jdg.vote_prior
    source_table: jdg
  - name: panel
    expr: jdg.panel
    source_table: jdg

# Real measures only. Prefer filter-on-dimension over inventing KPI columns.
metrics:
  - name: avg_confidence
    expr: AVG(sug.confidence)
    source_table: sug
