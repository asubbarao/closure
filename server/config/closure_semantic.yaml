# Closure semantic model — first-class schema graph (joins + dimensions).
# Loaded: CREATE SEMANTIC VIEW closure FROM YAML FILE '…'
#
# This is part of the data model, not a KPI dashboard.
#   dimensions  = typed slice axes (status, band, kind, case, entity, …)
#   metrics     = only real measures you ask for at query time
#                 (never invent pending_count / hit_count columns on grains)
#
# Product handlers SELECT grain tables/views.
# Ad-hoc slice (console / ops / catalog consumers):
#   FROM semantic_view('closure',
#     dimensions := ['case_id', 'status', 'band'],
#     metrics := ['avg_confidence']);
#
# Profiles without inventing metrics:
#   FROM (SUMMARIZE v_suggestions);
#   GET /api/catalog/v_suggestions/summary

comment: Review graph — suggestions ⋈ documents ⋈ cases ⋈ entities

tables:
  - alias: s
    table: v_suggestions
    pk_columns: [id]
  - alias: d
    table: documents
    pk_columns: [id]
  - alias: c
    table: cases
    pk_columns: [id]
  - alias: e
    table: entities
    pk_columns: [id]

joins:
  - name: sug_doc
    table: d
    from_alias: s
    fk_columns: [document_id]
    cardinality: ManyToOne
  - name: doc_case
    table: c
    from_alias: d
    fk_columns: [case_id]
    cardinality: ManyToOne
  - name: sug_entity
    table: e
    from_alias: s
    fk_columns: [entity_id]
    cardinality: ManyToOne

dimensions:
  - name: suggestion_id
    expr: s.id
    source_table: s
  - name: document_id
    expr: s.document_id
    source_table: s
  - name: page_no
    expr: s.page_no
    source_table: s
  - name: status
    expr: s.status
    source_table: s
  - name: band
    expr: s.band
    source_table: s
  - name: kind
    expr: s.kind
    source_table: s
  - name: source
    expr: s.source
    source_table: s
  - name: detector_key
    expr: s.detector_key
    source_table: s
  - name: judge_panel
    expr: s.judge_panel
    source_table: s
  - name: flag_tag
    expr: s.flag_tag
    source_table: s
  - name: confidence
    expr: s.confidence
    source_table: s
  - name: filename
    expr: d.filename
    source_table: d
  - name: case_id
    expr: c.id
    source_table: c
  - name: case_no
    expr: c.case_no
    source_table: c
  - name: entity_id
    expr: e.id
    source_table: e
  - name: entity_kind
    expr: e.kind
    source_table: e
  - name: entity_text
    expr: e.canonical_text
    source_table: e
  - name: group_key
    expr: s.group_key
    source_table: s

# Real measure only. No n=COUNT(*) product metric — filter a dimension instead.
metrics:
  - name: avg_confidence
    expr: AVG(s.confidence)
    source_table: s
